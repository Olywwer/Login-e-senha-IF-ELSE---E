<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login e Cadastro</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow login-card">

        <h3 class="text-center mb-3">
            <i class="bi bi-person-circle"></i> Sistema
        </h3>

        
        <ul class="nav nav-tabs mb-3">
            <li class="nav-item">
                <button class="nav-link active" onclick="mostrarLogin()">Login</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" onclick="mostrarCadastro()">Cadastro</button>
            </li>
        </ul>

        
        <div id="loginBox">
            <input type="text" id="loginUser" class="form-control mb-2" placeholder="Usuário">
            <input type="password" id="loginPass" class="form-control mb-2" placeholder="Senha">
            <button class="btn btn-primary w-100" onclick="fazerLogin()">Entrar</button>
        </div>

        
        <div id="cadastroBox" style="display:none;">
            <input type="text" id="cadUser" class="form-control mb-2" placeholder="Novo usuário">
            <input type="password" id="cadPass" class="form-control mb-2" placeholder="Nova senha">
            <button class="btn btn-success w-100" onclick="cadastrar()">Cadastrar</button>
        </div>

        <p id="mensagem" class="mt-3 text-center fw-bold"></p>

        <hr>

        <h6>📜 Logs</h6>
        <ul id="logList" class="list-group small"></ul>

    </div>
</div>

<script src="scritp.js"></script>
</body>
</html>
